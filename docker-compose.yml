services:
  tokenindex:
    build:
      context: .
      args:
        CARGO_PROFILE: docker-release
    container_name: tokenindex
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      start_period: 5s
      interval: 5s
      timeout: 3s
      retries: 12

  postgres:
    image: postgres:16
    container_name: tokenindex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tokenindex
      POSTGRES_USER: tokenindex
      POSTGRES_PASSWORD: tokenindex
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokenindex -d tokenindex"]
      start_period: 5s
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7
    container_name: tokenindex-redis
    restart: unless-stopped
    profiles: ["cache"]
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

volumes:
  pgdata:
